<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Create Your Scratchcard · Moments by Shanaz</title>

<link rel="icon" type="image/png" href="favicon-m.png">

<style>
body{
  font-family: Arial, sans-serif;
  margin:0;
  padding:0;
  background:#faf6f0;
}

header{
  text-align:center;
  padding:20px;
}

.logo{
  height:60px;
}

.container{
  max-width:600px;
  margin:auto;
  padding:20px;
}

input, textarea{
  width:100%;
  padding:12px;
  margin-top:10px;
}

button{
  margin-top:20px;
  padding:15px;
  width:100%;
  background:black;
  color:white;
  border:none;
  cursor:pointer;
}
</style>
</head>

<body>

<header>
  <a href="index.html">← Home</a>
  <br><br>
  <img src="moments-horizontal.png" class="logo">
</header>

<div class="container">

<h2>Create your moment</h2>

<!-- ETSY ORDER -->
<input type="text" id="orderNumber" placeholder="Etsy Order Number">

<!-- FORM -->
<input type="text" id="name" placeholder="Recipient Name">
<input type="text" id="headline" placeholder="Headline">
<textarea id="message" placeholder="Message"></textarea>

<button onclick="submitOrder()">Submit Design</button>

</div>

<script>
async function submitOrder(){

  const payload = {
    timestamp:new Date().toISOString(),
    orderNumber: document.getElementById('orderNumber').value,
    name: document.getElementById('name').value,
    headline: document.getElementById('headline').value,
    message: document.getElementById('message').value,
    status:'pending'
  };

  // Validation
  if(!payload.orderNumber || payload.orderNumber.length < 5){
    alert("Please enter a valid Etsy order number");
    return;
  }

  if(!payload.name){
    alert("Please enter a name");
    return;
  }

  try {
    await fetch("https://script.google.com/macros/s/AKfycbzceJiKgp2ZPlM6aG8F6jtg2yDEcbBPLfq5Qru9DCx69FTnRxiibbQ7raVEQB9-CpE86A/exec", {
      method: "POST",
      body: JSON.stringify(payload)
    });

    alert("✨ Your order has been submitted successfully!");

  } catch (error) {
    alert("Something went wrong. Please try again.");
    console.error(error);
  }
}
</script>

</body>
</html>
