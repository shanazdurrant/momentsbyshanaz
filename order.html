/* ══════ THE CARD ══════ */
.preview-card{
  max-width:360px;margin:0 auto;
  aspect-ratio:3/4;
  border-radius:6px;
  position:relative;overflow:hidden;
  box-shadow:0 20px 50px -10px rgba(60,40,20,0.35);
  background:var(--theme-bg,linear-gradient(145deg,var(--cream-soft),var(--cream-deep)));
  transition:box-shadow 0.6s;
}

/* Themed background imagery */
.theme-bg-layer{
  position:absolute;
  inset:0;
  background-position:center;
  background-size:cover;
  background-repeat:no-repeat;
  opacity:0.35;
  filter:brightness(0.85) contrast(1.05);
  z-index:0;
  transition:opacity 0.8s;
  mix-blend-mode:multiply;
}
