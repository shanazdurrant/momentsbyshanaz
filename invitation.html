<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Save the Date — Moments by Shanaz</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Pinyon+Script&family=Montserrat:wght@300;400;500;600;700;800&family=Allura&display=swap" rel="stylesheet">

<style>

/* EVERYTHING ORIGINAL LEFT EXACTLY THE SAME */

/* ✦ ADDED — WATERMARK */
#invitation-card::after{
  content:'';
  position:absolute;
  inset:0;
  background-image:url('logo-watermark.png'); /* your logo */
  background-repeat:no-repeat;
  background-position:center;
  background-size:180px;
  opacity:0.05;
  pointer-events:none;
  z-index:1;
}

</style>
</head>

<body>

<!-- LOADING VEIL -->
<div id="veil">
  <!-- ✦ LOGO REPLACEMENT -->
  <img src="logo-horizontal.png" style="height:60px;">
  <div class="veil-bar"><div class="veil-bar-fill"></div></div>
</div>

<!-- EDITOR -->
<div id="editor">
  <div class="editor-top">
    <div class="editor-brand">
      <div class="editor-brand-icon">✦</div>

      <!-- ✦ LOGO REPLACEMENT -->
      <img src="logo-horizontal.png" style="height:28px;">

    </div>
    <div class="editor-badge">✦ Save the Date Builder</div>
  </div>

  <!-- TABS -->
  <div class="editor-tabs">
    <button class="tab-btn active" onclick="switchTab('occasion')">✦ Occasion</button>
    <button class="tab-btn" onclick="switchTab('details')">Details</button>
    <button class="tab-btn" onclick="switchTab('message')">Message</button>
    <button class="tab-btn" onclick="switchTab('theme')">Theme</button>
  </div>

  <!-- OCCASION TAB -->
  <div class="tab-panel active" id="tab-occasion">
    <div class="swatch-label">Choose an occasion</div>
    <div class="occasion-chips">
      <span class="occ-chip active" data-occ="save" onclick="setOccasion(this)">💌 Save the Date</span>
      <span class="occ-chip" data-occ="wedding" onclick="setOccasion(this)">💍 Wedding</span>
      <span class="occ-chip" data-occ="birthday" onclick="setOccasion(this)">🎂 Birthday</span>
      <span class="occ-chip" data-occ="babyshower" onclick="setOccasion(this)">🍼 Baby Shower</span>
      <span class="occ-chip" data-occ="engagement" onclick="setOccasion(this)">💎 Engagement</span>
      <span class="occ-chip" data-occ="anniversary" onclick="setOccasion(this)">🌹 Anniversary</span>
      <span class="occ-chip" data-occ="christening" onclick="setOccasion(this)">✝ Christening</span>
      <span class="occ-chip" data-occ="hen" onclick="setOccasion(this)">🥂 Hen Do</span>
      <span class="occ-chip" data-occ="other" onclick="setOccasion(this)">✨ Other</span>
    </div>
  </div>

  <!-- DETAILS TAB (unchanged) -->
  <div class="tab-panel" id="tab-details">
    <!-- unchanged -->
  </div>

  <!-- MESSAGE TAB (unchanged) -->
  <div class="tab-panel" id="tab-message">
    <!-- unchanged -->
  </div>

  <!-- THEME TAB -->
  <div class="tab-panel" id="tab-theme">
    <div class="swatch-label">Card theme</div>

    <div class="swatch-row" style="margin-bottom:16px">
      <!-- unchanged swatches -->
    </div>

    <div class="form-group" style="margin-top:4px">
      <label>Card icon / emoji</label>
      <input type="text" id="inp-icon" maxlength="4" oninput="liveUpdate()" style="max-width:100px">
    </div>

    <!-- ✦ ADDED BESPOKE OPTION -->
    <div class="form-group" style="margin-top:14px">
      <label>Bespoke Request (optional)</label>
      <textarea id="inp-bespoke" placeholder="Describe your theme (e.g. princess, safari, 90s party...)"></textarea>
    </div>

    <div style="margin-top:8px;font-family:'Montserrat',sans-serif;font-size:10px;color:rgba(255,255,255,0.5)">
      ✦ Bespoke designs are custom-made — a preview will be sent before final delivery
    </div>

  </div>

  <button class="update-btn" onclick="liveUpdate()">✦ Update Preview</button>
</div>

<!-- CARD -->
<div id="preview-wrap">
  <div id="invitation-card">

    <!-- HEADER (unchanged) -->
    <div class="card-header" id="card-header">
      <!-- unchanged -->
    </div>

    <!-- BODY (unchanged) -->
    <div class="card-body">
      <!-- unchanged -->
    </div>

    <!-- FOOTER -->
    <div class="card-footer">
      <div>

        <!-- ✦ LOGO REPLACEMENT -->
        <img src="logo-horizontal.png" style="height:26px;">

      </div>
      <div class="card-footer-divider"></div>
      <div class="card-footer-note">Digital Invitation</div>
    </div>

  </div>
</div>

<!-- SHARE BAR (unchanged) -->

<script>

/* ORIGINAL JS KEPT */

/* ✦ ADDED */
state.bespoke = '';

function liveUpdate() {
  // original code...

  // ✦ ADD THIS LINE
  state.bespoke = document.getElementById('inp-bespoke')?.value || '';
}

</script>

</body>
</html>
