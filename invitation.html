<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Invitation · Moments by Shanaz</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Inter:wght@300;400;500&family=Pinyon+Script&family=Allura&display=swap" rel="stylesheet">

<style>

:root{
  --ivory:#FAF6F0;
  --ivory-soft:#FDFBF6;
  --blush:#F4E3D7;
  --burgundy:#6B1E3F;
  --gold:#C9A961;
  --gold-light:#E8D4A0;
  --emerald:#1F4538;
  --charcoal:#2B2B2B;
  --charcoal-soft:#555;
}

*{box-sizing:border-box;}

body{
  margin:0;
  font-family:'Inter',sans-serif;
  background:var(--ivory);
  color:var(--charcoal);
  display:flex;
  align-items:center;
  justify-content:center;
  min-height:100vh;
  padding:20px;
}

/* ───────── INVITATION CARD ───────── */
.invitation-card{
  position:relative;
  width:100%;
  max-width:420px;
  background:var(--ivory-soft);
  padding:40px 30px;
  border-radius:6px;
  border:1px solid rgba(201,169,97,0.25);
  box-shadow:0 30px 60px -20px rgba(43,43,43,0.25);
  text-align:center;
  overflow:hidden;
}

/* ───────── LOGO (replaces text) ───────── */
.inv-logo{
  height:75px;
  width:auto;
  display:block;
  margin:0 auto 10px;
  opacity:0.95;
}

/* ───────── WATERMARK ───────── */
.watermark{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%, -50%) rotate(-18deg);
  font-size:42px;
  font-family:'Cormorant Garamond',serif;
  color:rgba(201,169,97,0.08);
  pointer-events:none;
}

/* ───────── TEXT ───────── */
.headline{
  font-family:'Cormorant Garamond',serif;
  font-size:32px;
  margin:10px 0;
}

.names{
  font-size:20px;
  margin-bottom:20px;
}

.details{
  font-size:15px;
  color:var(--charcoal-soft);
  line-height:1.6;
}

/* ───────── RSVP BUTTON ───────── */
.rsvp-btn{
  display:inline-block;
  margin-top:25px;
  padding:12px 28px;
  background:var(--burgundy);
  color:white;
  text-decoration:none;
  border-radius:30px;
  font-size:13px;
  letter-spacing:1px;
  transition:all 0.3s ease;
}

.rsvp-btn:hover{
  background:var(--gold);
  color:var(--charcoal);
}

/* ───────── PREVIEW NOTE ───────── */
.preview-note{
  margin-top:18px;
  font-size:12px;
  color:rgba(0,0,0,0.5);
}

/* ───────── BESPOKE OPTION ───────── */
.bespoke-section{
  margin-top:25px;
  text-align:left;
}

.form-group{
  margin-bottom:14px;
}

.form-group label{
  font-size:11px;
  color:rgba(0,0,0,0.6);
  display:block;
  margin-bottom:5px;
}

select, textarea{
  width:100%;
  padding:10px;
  border:1px solid rgba(0,0,0,0.1);
  border-radius:6px;
  font-family:inherit;
}

textarea{
  min-height:80px;
}

</style>
</head>

<body>

<div class="invitation-card">

  <!-- WATERMARK -->
  <div class="watermark">Moments</div>

  <!-- LOGO -->
  <img src="logo-horizontal.png" alt="Moments by Shanaz" class="inv-logo">

  <!-- CONTENT -->
  <div class="headline" id="headline">You're Invited</div>
  <div class="names" id="names">Sophie & James</div>

  <div class="details">
    <div id="date">Saturday, 14 September 2025</div>
    <div id="time">2:00 PM</div>
    <div id="venue">The Grand Manor, Birmingham</div>
  </div>

  <a href="#" class="rsvp-btn">RSVP</a>

  <!-- PREVIEW NOTE -->
  <div class="preview-note">
    ✦ A preview will be sent for approval before final delivery
  </div>

  <!-- BESPOKE OPTION -->
  <div class="bespoke-section">
    <div class="form-group">
      <label>Invitation Style</label>
      <select id="inv-style">
        <option value="standard">Standard Invitation</option>
        <option value="bespoke">✨ Bespoke Design (Preview Provided)</option>
      </select>
    </div>

    <div class="form-group" id="theme-box" style="display:none;">
      <label>Your Theme / Vision</label>
      <textarea placeholder="e.g. pink bows, minimalist black & gold, cartoon theme"></textarea>
    </div>
  </div>

</div>

<script>

/* ───────── BESPOKE TOGGLE ───────── */
document.getElementById('inv-style').addEventListener('change', function(){
  document.getElementById('theme-box').style.display =
    this.value === 'bespoke' ? 'block' : 'none';
});

/* ───────── LOAD DATA FROM ADMIN LINK ───────── */
const params = new URLSearchParams(window.location.search);

if(params.get('h')) document.getElementById('headline').textContent = params.get('h');
if(params.get('n')) document.getElementById('names').textContent = params.get('n');
if(params.get('d')) document.getElementById('date').textContent = params.get('d');
if(params.get('tm')) document.getElementById('time').textContent = params.get('tm');
if(params.get('v')) document.getElementById('venue').textContent = params.get('v');

</script>

</body>
</html>
