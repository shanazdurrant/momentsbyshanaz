<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Invitation · Moments by Shanaz</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>

:root{
  --ivory:#FAF6F0;
  --blush:#F4E3D7;
  --burgundy:#6B1E3F;
  --gold:#C9A961;
  --charcoal:#2B2B2B;
}

body{
  margin:0;
  font-family:'Inter',sans-serif;
  background:var(--ivory);
  display:flex;
  align-items:center;
  justify-content:center;
  min-height:100vh;
}

/* ───────── LOGO ───────── */
.inv-logo{
  height:70px;
  display:block;
  margin:0 auto 20px;
  opacity:0.95;
}

/* ───────── INVITATION CARD ───────── */
.invitation-card{
  width:90%;
  max-width:420px;
  background:white;
  padding:40px 30px;
  text-align:center;
  border-radius:6px;
  position:relative;
  box-shadow:0 20px 40px rgba(0,0,0,0.08);
}

/* ───────── WATERMARK ───────── */
.watermark{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%, -50%) rotate(-18deg);
  font-size:42px;
  font-family:'Cormorant Garamond',serif;
  color:rgba(201,169,97,0.08);
  pointer-events:none;
}

/* ───────── TEXT ───────── */
.headline{
  font-family:'Cormorant Garamond',serif;
  font-size:32px;
  margin-bottom:10px;
}

.names{
  font-size:20px;
  margin-bottom:20px;
}

.details{
  font-size:15px;
  color:#555;
  line-height:1.6;
}

/* ───────── RSVP ───────── */
.rsvp-btn{
  margin-top:30px;
  display:inline-block;
  padding:12px 28px;
  background:var(--burgundy);
  color:white;
  text-decoration:none;
  border-radius:30px;
  font-size:13px;
  letter-spacing:1px;
}

/* ───────── PREVIEW NOTE ───────── */
.preview-note{
  margin-top:20px;
  font-size:12px;
  color:#777;
}

/* ───────── BESPOKE OPTION ───────── */
.form-group{
  margin-top:20px;
  text-align:left;
}

.form-group label{
  font-size:12px;
  display:block;
  margin-bottom:6px;
}

select, textarea{
  width:100%;
  padding:10px;
  border:1px solid #ddd;
  border-radius:6px;
  font-family:inherit;
}

textarea{
  min-height:80px;
}

</style>
</head>

<body>

<div class="invitation-card">

  <!-- LOGO -->
  <img src="logo-horizontal.png" class="inv-logo" alt="Moments by Shanaz">

  <!-- WATERMARK -->
  <div class="watermark">Moments</div>

  <!-- CONTENT -->
  <div class="headline" id="headline">You're Invited</div>
  <div class="names" id="names">Sophie & James</div>

  <div class="details">
    <div id="date">Saturday, 14th September 2025</div>
    <div id="time">at 2:00 PM</div>
    <div id="venue">The Grand Manor, Birmingham</div>
  </div>

  <a href="#" class="rsvp-btn">RSVP</a>

  <!-- PREVIEW NOTE -->
  <div class="preview-note">
    ✦ Your invitation will be designed and a preview will be sent before final delivery
  </div>

  <!-- BESPOKE OPTION -->
  <div class="form-group">
    <label>Invitation Style</label>
    <select id="inv-style">
      <option value="standard">Standard Template</option>
      <option value="bespoke">✨ Bespoke Design (Preview Provided)</option>
    </select>
  </div>

  <div class="form-group" id="theme-box" style="display:none;">
    <label>Theme / Vision</label>
    <textarea placeholder="e.g. pink bows, minimalist black & gold, cartoon theme"></textarea>
  </div>

</div>

<script>

/* ───────── BESPOKE TOGGLE ───────── */
document.getElementById('inv-style').addEventListener('change', function(){
  document.getElementById('theme-box').style.display =
    this.value === 'bespoke' ? 'block' : 'none';
});

/* ───────── LOAD FROM URL PARAMS (from admin) ───────── */
const params = new URLSearchParams(window.location.search);

if(params.get('h')) document.getElementById('headline').textContent = params.get('h');
if(params.get('n')) document.getElementById('names').textContent = params.get('n');
if(params.get('d')) document.getElementById('date').textContent = params.get('d');
if(params.get('tm')) document.getElementById('time').textContent = params.get('tm');
if(params.get('v')) document.getElementById('venue').textContent = params.get('v');

</script>

</body>
</html>
