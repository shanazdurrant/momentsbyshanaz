<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Your Invitation Preview · Moments by Shanaz</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="icon" type="image/png" href="logo-m.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500&family=Dancing+Script:wght@400;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Pacifico&family=Nunito:wght@400;700&family=Abril+Fatface&family=Lato:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --cream: #faf8f4; --gold: #b8924a; --charcoal: #2c2825; --mid: #6b6460; --soft: #9c958f; --border: #e8e2d9; }
    body { font-family: 'Jost', sans-serif; background: var(--cream); color: var(--charcoal); font-weight: 300; min-height: 100vh; }

    nav { background: rgba(250,248,244,0.96); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: center; height: 64px; }
    nav img { height: 32px; }

    .preview-page { max-width: 600px; margin: 0 auto; padding: 60px 24px 80px; text-align: center; }

    .eyebrow { font-size: 11px; letter-spacing: 0.28em; text-transform: uppercase; color: var(--gold); margin-bottom: 20px; }
    .preview-page h1 { font-family: 'Cormorant Garamond', serif; font-size: clamp(1.8rem, 4vw, 2.6rem); font-weight: 300; line-height: 1.2; margin-bottom: 16px; }
    .preview-page h1 em { font-style: italic; color: var(--gold); }
    .preview-page > p { font-size: 14px; color: var(--mid); line-height: 1.7; max-width: 420px; margin: 0 auto 48px; }

    /* CARD */
    .card-wrap { display: flex; justify-content: center; margin-bottom: 40px; }
    .inv-card { width: 320px; aspect-ratio: 5/7; position: relative; box-shadow: 0 30px 80px rgba(44,40,37,0.2), 0 4px 20px rgba(44,40,37,0.08); border-radius: 4px; overflow: hidden; }
    .card-inner { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 36px 28px; text-align: center; }
    .card-frame { position: absolute; inset: 16px; border: 1px solid rgba(184,146,74,0.3); pointer-events: none; border-radius: 1px; }

    .font-elegant .card-name { font-family: 'Cormorant Garamond', serif !important; font-style: italic; font-weight: 400; }
    .font-elegant .card-headline { font-family: 'Lato', sans-serif !important; font-weight: 300; letter-spacing: 0.16em; text-transform: uppercase; font-style: normal; font-size: 0.7rem !important; }
    .font-modern .card-name { font-family: 'Playfair Display', serif !important; font-weight: 700; font-style: normal; }
    .font-modern .card-headline { font-family: 'Lato', sans-serif !important; font-weight: 300; font-style: normal; }
    .font-playful .card-name { font-family: 'Dancing Script', cursive !important; font-weight: 600; }
    .font-playful .card-headline { font-family: 'Nunito', sans-serif !important; font-weight: 700; font-style: normal; }
    .font-comical .card-name { font-family: 'Pacifico', cursive !important; font-weight: 400; font-style: normal; font-size: 1.3rem !important; }
    .font-comical .card-headline { font-family: 'Nunito', sans-serif !important; font-weight: 700; font-style: normal; }
    .font-comical .card-eyebrow { font-family: 'Abril Fatface', serif !important; }

    .card-eyebrow { font-family: 'Jost', sans-serif; font-size: 8px; letter-spacing: 0.3em; text-transform: uppercase; margin-bottom: 14px; opacity: 0.65; }
    .card-divider { width: 28px; height: 1px; background: currentColor; opacity: 0.18; margin: 9px auto; }
    .card-name { font-family: 'Dancing Script', cursive; font-size: 1.7rem; font-weight: 600; line-height: 1.2; margin-bottom: 3px; }
    .card-headline { font-family: 'Cormorant Garamond', serif; font-size: 0.85rem; font-weight: 300; font-style: italic; margin-bottom: 12px; opacity: 0.75; }
    .card-body { font-size: 10px; letter-spacing: 0.06em; line-height: 1.9; opacity: 0.6; margin-bottom: 10px; }
    .card-date { font-family: 'Cormorant Garamond', serif; font-size: 0.88rem; font-weight: 300; margin-bottom: 4px; opacity: 0.85; }
    .card-from { font-size: 9px; letter-spacing: 0.1em; opacity: 0.45; margin-top: 10px; font-style: italic; }
    .card-stamp { position: absolute; bottom: 12px; right: 12px; width: 24px; height: 24px; opacity: 0.15; }
    .card-stamp img { width: 100%; height: 100%; object-fit: contain; }
    .card-watermark { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; pointer-events: none; transform: rotate(-28deg); z-index: 10; }
    .card-watermark span { font-family: 'Jost', sans-serif; font-size: 10px; letter-spacing: 0.28em; text-transform: uppercase; white-space: nowrap; }

    /* RESPONSE SECTION */
    .response-box { background: #fff; border: 1px solid var(--border); border-radius: 6px; padding: 32px; text-align: left; margin-bottom: 24px; }
    .response-box h3 { font-family: 'Cormorant Garamond', serif; font-size: 1.3rem; font-weight: 300; margin-bottom: 16px; }
    .resp-options { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
    .resp-option { display: flex; align-items: flex-start; gap: 12px; padding: 14px 16px; border: 1px solid var(--border); border-radius: 4px; cursor: pointer; transition: border-color 0.2s, background 0.2s; }
    .resp-option:hover { border-color: var(--gold); background: rgba(184,146,74,0.03); }
    .resp-option.sel { border-color: var(--gold); background: rgba(184,146,74,0.06); }
    .resp-radio { width: 16px; height: 16px; border-radius: 50%; border: 1.5px solid var(--border); margin-top: 3px; flex-shrink: 0; transition: border-color 0.2s, background 0.2s; }
    .resp-option.sel .resp-radio { border-color: var(--gold); background: var(--gold); }
    .resp-label { font-size: 14px; font-weight: 400; margin-bottom: 2px; }
    .resp-sub { font-size: 12px; color: var(--soft); }
    .resp-notes { width: 100%; background: var(--cream); border: 1px solid var(--border); border-radius: 4px; padding: 12px 14px; font-family: 'Jost', sans-serif; font-size: 13px; font-weight: 300; color: var(--charcoal); outline: none; resize: none; min-height: 90px; margin-bottom: 16px; display: none; }
    .resp-notes:focus { border-color: var(--gold); }
    .resp-notes.vis { display: block; }
    .send-btn { width: 100%; background: var(--charcoal); color: var(--cream); border: none; border-radius: 4px; padding: 15px; font-family: 'Jost', sans-serif; font-size: 12px; font-weight: 500; letter-spacing: 0.18em; text-transform: uppercase; cursor: pointer; transition: background 0.2s; }
    .send-btn:hover { background: var(--gold); }

    .watermark-note { font-size: 11px; color: var(--soft); line-height: 1.7; }
    .watermark-note strong { color: var(--gold); }

    /* SENT STATE */
    #sent-state { display: none; background: rgba(74,124,89,0.08); border: 1px solid rgba(74,124,89,0.3); border-radius: 6px; padding: 32px; text-align: center; }
    #sent-state.vis { display: block; }
    #sent-state h3 { font-family: 'Cormorant Garamond', serif; font-size: 1.5rem; font-weight: 300; margin-bottom: 12px; }
    #sent-state p { font-size: 14px; color: var(--mid); line-height: 1.7; }

    /* ERROR STATE */
    .error-state { text-align: center; padding: 80px 20px; }
    .error-state h2 { font-family: 'Cormorant Garamond', serif; font-size: 1.8rem; font-weight: 300; margin-bottom: 12px; color: var(--mid); }
    .error-state p { font-size: 14px; color: var(--soft); }
  </style>
</head>
<body>

<nav>
  <a href="/"><img src="logo-horizontal.png" alt="Moments by Shanaz" /></a>
</nav>

<div class="preview-page" id="preview-page">
  <div id="loading" style="padding:80px 0; color:var(--soft); font-size:14px; letter-spacing:0.08em;">Loading your preview…</div>
</div>

<script>
  function getParam() {
    return new URLSearchParams(location.search).get('d');
  }

  function decodeData(param) {
    try { return JSON.parse(decodeURIComponent(atob(param))); }
    catch(e) { return null; }
  }

  function render(d) {
    const page = document.getElementById('preview-page');

    const textDark = d.textDark !== false;
    const textColor = textDark ? '#2c2825' : '#f0ebe2';
    const wmColor  = textDark ? 'rgba(0,0,0,0.1)' : 'rgba(255,255,255,0.18)';
    const stampFilter = textDark ? 'none' : 'brightness(0) invert(1)';

    // Build bg style
    let bgStyle = '';
    if (d.texture && d.texture !== 'none') {
      bgStyle = `background-image:url('${d.texture}');background-size:cover;background-position:center;background-blend-mode:multiply;background-color:${d.bg};`;
    } else if (d.bgMode === 'gradient') {
      bgStyle = `background-image:${d.bg};`;
    } else {
      bgStyle = `background-color:${d.bg||'#fefcf8'};`;
    }

    const frameDisplay = (d.frame === 'none') ? 'none' : 'block';
    const frameBorder = (d.frame === 'minimal')
      ? '1px solid rgba(255,255,255,0.18)'
      : '1px solid rgba(184,146,74,0.3)';

    page.innerHTML = `
      <p class="eyebrow">Your Invitation Draft</p>
      <h1>Here's your <em>preview</em></h1>
      <p>This is your watermarked draft invitation. Review it carefully and let Shanaz know if you're happy with it or if you'd like any changes.</p>

      <div class="card-wrap">
        <div class="inv-card">
          <div class="card-inner font-${d.font||'elegant'}" style="${bgStyle}color:${textColor};">
            <div class="card-frame" style="display:${frameDisplay};border:${frameBorder};"></div>
            <p class="card-eyebrow">${esc(d.eyebrow||"You're Invited")}</p>
            <div class="card-divider"></div>
            <div class="card-name">${esc(d.name||'')}</div>
            <div class="card-headline">${esc(d.headline||'')}</div>
            <div class="card-divider"></div>
            <div class="card-body">${esc(d.venue||'')}</div>
            <div class="card-date">${esc(d.date||'')}</div>
            <div class="card-from">${d.from ? 'With love, '+esc(d.from) : ''}</div>
            <div class="card-stamp"><img src="logo-m.png" alt="M" style="width:100%;height:100%;object-fit:contain;filter:${stampFilter};" /></div>
          </div>
          <div class="card-watermark"><span style="color:${wmColor};">Moments by Shanaz · Preview Only</span></div>
        </div>
      </div>

      <p class="watermark-note" style="margin-bottom:40px;">
        <strong>This is a watermarked preview.</strong> The watermark is removed from your final, delivered invitation.
      </p>

      <div class="response-box">
        <h3>What do you think?</h3>
        <div class="resp-options">
          <div class="resp-option sel" onclick="pickResp(this,'approve')">
            <div class="resp-radio"></div>
            <div><div class="resp-label">✅ I love it — please go ahead!</div><div class="resp-sub">Shanaz will finalise and send your invitation</div></div>
          </div>
          <div class="resp-option" onclick="pickResp(this,'changes')">
            <div class="resp-radio"></div>
            <div><div class="resp-label">✏️ I'd like a few changes</div><div class="resp-sub">Let Shanaz know what you'd like adjusted</div></div>
          </div>
        </div>
        <textarea class="resp-notes" id="resp-notes" placeholder="Please describe the changes you'd like — text edits, colour adjustments, layout tweaks…"></textarea>
        <button class="send-btn" onclick="sendResponse()">Send My Response to Shanaz</button>
      </div>

      <div id="sent-state">
        <h3>Response sent! ✦</h3>
        <p>Thank you — Shanaz will be in touch shortly with your finalised invitation (or updated draft if changes were requested).</p>
      </div>
    `;
  }

  function esc(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function pickResp(el, type) {
    document.querySelectorAll('.resp-option').forEach(o=>o.classList.remove('sel'));
    el.classList.add('sel');
    const notes = document.getElementById('resp-notes');
    if (notes) notes.classList.toggle('vis', type==='changes');
  }

  function sendResponse() {
    const sel = document.querySelector('.resp-option.sel');
    const type = sel ? (sel.querySelector('.resp-label').textContent.includes('love') ? 'approved' : 'changes') : 'unknown';
    const notes = document.getElementById('resp-notes');
    const notesVal = notes ? notes.value : '';
    if (type === 'changes' && !notesVal.trim()) {
      alert('Please describe the changes you\'d like before sending.');
      return;
    }
    // In a static site, we open mailto as the send mechanism
    const subject = encodeURIComponent('Invitation Draft Response · Moments by Shanaz');
    const body = encodeURIComponent(
      type === 'approved'
        ? `Hi Shanaz,\n\nI love my invitation draft — please go ahead and finalise it!\n\nThank you!`
        : `Hi Shanaz,\n\nI'd like a few changes to my invitation:\n\n${notesVal}\n\nThank you!`
    );
    window.location.href = `mailto:hello@momentsbyshanaz.co.uk?subject=${subject}&body=${body}`;
    document.getElementById('sent-state').classList.add('vis');
  }

  // ── Init ─────────────────────────────────────────────────
  const param = getParam();
  if (!param) {
    document.getElementById('preview-page').innerHTML = `
      <div class="error-state">
        <h2>No preview found</h2>
        <p>This link doesn't contain a valid invitation preview. Please check the link you were sent.</p>
      </div>`;
  } else {
    const data = decodeData(param);
    if (!data) {
      document.getElementById('preview-page').innerHTML = `
        <div class="error-state">
          <h2>Something went wrong</h2>
          <p>We couldn't load this invitation preview. Please ask Shanaz to resend the link.</p>
        </div>`;
    } else {
      render(data);
    }
  }
</script>
</body>
</html>
