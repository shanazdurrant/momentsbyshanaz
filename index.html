<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Moments by Shanaz · Luxury Digital Keepsakes</title>
<meta name="description" content="Personalised digital scratchcards, love letters and keepsakes for life's biggest moments. Made with care in the UK.">

<link rel="icon" type="image/png" href="favicon.png">

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=Inter:wght@300;400;500&family=Allura&display=swap" rel="stylesheet">

<style>
:root{
  --ivory:#FAF6F0;
  --burgundy:#6B1E3F;
  --gold:#C9A961;
  --emerald:#1F4538;
  --charcoal:#2B2B2B;
  --charcoal-soft:#555;
}

body{
  margin:0;
  padding-top:150px;
  font-family:'Inter',sans-serif;
  background:var(--ivory);
  color:var(--charcoal);
}

/* HEADER */
.header{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  padding:50px 20px 30px;
  background:rgba(250,246,240,0.75);
  backdrop-filter:blur(14px);
  z-index:1000;
  text-align:center;
  transition:all 0.4s ease;
}

/* shrink on scroll */
.header.scrolled{
  padding:18px 20px;
  background:rgba(250,246,240,0.95);
}

/* LOGO */
.logo{
  height:160px;
  max-width:90%;
  display:block;
  margin:auto;

  opacity:0;
  transform:translateY(-10px);
  transition:all 0.6s ease;

  /* blending effect */
  mix-blend-mode:multiply;
}

/* fade in */
.logo.loaded{
  opacity:1;
  transform:translateY(0);
}

/* shrink logo */
.header.scrolled .logo{
  height:70px;
}

.logo:hover{
  transform:scale(1.04);
}

/* tagline */
.brand-tagline{
  font-size:11px;
  letter-spacing:3px;
  margin-top:8px;
  color:var(--charcoal-soft);
  opacity:0;
  transition:opacity 1s ease;
}

/* HERO */
.hero{
  text-align:center;
  padding:70px 20px 40px;
  max-width:920px;
  margin:auto;
}

.hero h1{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(38px,6.5vw,60px);
  font-weight:400;
}

.hero em{
  color:var(--gold);
}

.hero p{
  margin-top:20px;
  color:var(--charcoal-soft);
}

/* BUTTON */
.btn{
  display:inline-block;
  margin-top:30px;
  padding:16px 36px;
  background:var(--burgundy);
  color:white;
  border-radius:40px;
  text-decoration:none;
}

/* SECTIONS */
.section{
  padding:60px 20px;
  text-align:center;
}

/* subtle scroll reveal */
.reveal{
  opacity:0;
  transform:translateY(30px);
  transition:all 0.8s ease;
}

.reveal.visible{
  opacity:1;
  transform:translateY(0);
}

/* FOOTER */
footer{
  text-align:center;
  padding:40px;
}
</style>
</head>

<body>

<header class="header">
  <img src="logo-horizontal.png" class="logo">
  <p class="brand-tagline">DIGITAL KEEPSAKES • MADE WITH CARE</p>
</header>

<section class="hero reveal">
  <h1>Turn life's biggest moments into <em>something unforgettable</em></h1>
  <p>Luxury digital experiences for announcements, celebrations, and memories that matter.</p>

  <a href="order.html" class="btn">Create Your First Moment</a>
</section>

<section class="section reveal">
  <h2>Designed for every moment</h2>
</section>

<footer>
  © Moments by Shanaz
</footer>

<script>
// fade-in logo
window.addEventListener("load", ()=>{
  document.querySelector(".logo").classList.add("loaded");
  document.querySelector(".brand-tagline").style.opacity = 1;
});

// scroll header shrink
window.addEventListener("scroll", ()=>{
  const header = document.querySelector(".header");
  if(window.scrollY > 50){
    header.classList.add("scrolled");
  } else {
    header.classList.remove("scrolled");
  }
});

// scroll reveal (very subtle)
const reveals = document.querySelectorAll(".reveal");

window.addEventListener("scroll", ()=>{
  reveals.forEach(el=>{
    const top = el.getBoundingClientRect().top;
    if(top < window.innerHeight - 80){
      el.classList.add("visible");
    }
  });
});
</script>

</body>
</html>
