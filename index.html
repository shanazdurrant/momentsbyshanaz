<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Moments by Shanaz</title>

<link rel="icon" type="image/png" href="favicon-m.png">

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&family=Inter:wght@300;400&family=Allura&display=swap" rel="stylesheet">

<style>
:root{
  --ivory:#FAF6F0;
  --burgundy:#6B1E3F;
  --gold:#C9A961;
  --emerald:#1F4538;
  --charcoal:#2B2B2B;
}

body{
  margin:0;
  font-family:'Inter',sans-serif;
  background:linear-gradient(135deg,#faf6f0,#f4e3d7);
  color:var(--charcoal);
}

/* HEADER */
header{
  position:sticky;
  top:0;
  background:rgba(250,246,240,0.9);
  backdrop-filter:blur(10px);
  padding:15px 30px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.logo{
  height:55px;
}

/* HERO */
.hero{
  text-align:center;
  padding:120px 20px;
}

.hero h1{
  font-family:'Cormorant Garamond',serif;
  font-size:52px;
}

.hero em{
  color:var(--gold);
}

.hero p{
  max-width:500px;
  margin:20px auto;
  font-size:16px;
}

.btn{
  background:var(--burgundy);
  color:white;
  padding:14px 28px;
  border-radius:30px;
  text-decoration:none;
  display:inline-block;
  margin-top:20px;
}

/* PRODUCTS */
.section{
  padding:80px 20px;
  text-align:center;
}

.card{
  background:white;
  padding:30px;
  border-radius:20px;
  margin:20px auto;
  max-width:300px;
  box-shadow:0 10px 30px rgba(0,0,0,0.05);
}

footer{
  text-align:center;
  padding:30px;
}
</style>
</head>

<body>

<header>
  <img src="moments-horizontal.png" class="logo">
</header>

<section class="hero">
  <h1>Create <em>unforgettable moments</em></h1>
  <p>Luxury digital keepsakes designed to make every reveal special.</p>

  <!-- LINK TO SCRATCHCARD PAGE -->
  <a href="Momentsscratchcard.html" class="btn">Create Your Scratchcard</a>
</section>

<section class="section">
  <h2>Our Products</h2>

  <div class="card">
    🎁 Scratchcards
  </div>

  <div class="card">
    💌 Invitations
  </div>

</section>

<footer>
  © Moments by Shanaz
</footer>

</body>
</html>
