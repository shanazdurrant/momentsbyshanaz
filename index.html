<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Moments by Shanaz</title>

<link rel="icon" type="image/png" href="favicon-m.png">

<style>
:root {
  --burgundy:#6B1E3F;
  --gold:#C9A961;
  --emerald:#1F4538;
  --ivory:#FAF6F0;
  --charcoal:#2B2B2B;
}

body {
  margin:0;
  font-family: 'Montserrat', sans-serif;
  background: var(--ivory);
  color: var(--charcoal);
}

/* HEADER */
header {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px 40px;
}

.logo {
  height:60px;
}

/* HERO */
.hero {
  text-align:center;
  padding:100px 20px;
}

.hero h1 {
  font-size:48px;
  color:var(--burgundy);
}

.hero p {
  font-size:18px;
  margin:20px 0;
}

.btn {
  background:var(--burgundy);
  color:white;
  padding:15px 30px;
  text-decoration:none;
  border-radius:30px;
}

/* SECTION */
.section {
  padding:60px 20px;
  text-align:center;
}

.card {
  background:white;
  padding:30px;
  border-radius:20px;
  margin:20px auto;
  max-width:300px;
  box-shadow:0 10px 30px rgba(0,0,0,0.05);
}

/* FOOTER */
footer {
  text-align:center;
  padding:30px;
  font-size:14px;
}
</style>
</head>

<body>

<header>
  <img src="moments-horizontal.png" class="logo">
</header>

<section class="hero">
  <h1>Luxury Digital Keepsakes</h1>
  <p>Beautiful, personalised designs for life’s most special moments.</p>
  <a href="#" class="btn">Shop Now</a>
</section>

<section class="section">
  <h2>What We Offer</h2>

  <div class="card">
    🎁 Scratch Cards
  </div>

  <div class="card">
    💌 Invitations
  </div>

  <div class="card">
    🎉 Event Keepsakes
  </div>

</section>

<footer>
  © Moments by Shanaz — Made with Care
</footer>

</body>
</html>
